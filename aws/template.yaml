AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: NARA-AI - AI 기반 국가기록물 지능형 검색/분류/활용 체계

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.11
    Environment:
      Variables:
        PYTHONIOENCODING: utf-8
        PYTHONUTF8: "1"

Resources:
  NaraAIFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: api.lambda_handler.handler
      CodeUri: ../
      Description: NARA-AI API (검색/PII/OCR)
      Events:
        HealthApi:
          Type: HttpApi
          Properties:
            Path: /health
            Method: get
        StatusApi:
          Type: HttpApi
          Properties:
            Path: /status
            Method: get
        SearchApi:
          Type: HttpApi
          Properties:
            Path: /search
            Method: post
        PIIApi:
          Type: HttpApi
          Properties:
            Path: /pii/{proxy+}
            Method: post
        OCRApi:
          Type: HttpApi
          Properties:
            Path: /ocr/{proxy+}
            Method: post
        RootApi:
          Type: HttpApi
          Properties:
            Path: /
            Method: get

Outputs:
  ApiEndpoint:
    Description: NARA-AI API URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
