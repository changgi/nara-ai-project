apiVersion: v1
kind: Namespace
metadata:
  name: nara-ai
  labels:
    app.kubernetes.io/name: nara-ai
    app.kubernetes.io/part-of: national-archives-ai
    security.nara.go.kr/level: sensitive  # N2SF 민감 등급
---
# NetworkPolicy: 에어갭 강제 - 외부 네트워크 차단
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-external
  namespace: nara-ai
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: national-archives-ai
      # 내부 네임스페이스 간 통신만 허용
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8  # 내부 네트워크만
