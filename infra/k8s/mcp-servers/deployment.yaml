apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-archive
  namespace: nara-ai
  labels:
    app: mcp-archive
    component: mcp-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-archive
  template:
    metadata:
      labels:
        app: mcp-archive
        component: mcp-server
    spec:
      containers:
        - name: mcp-archive
          image: nara-ai/mcp-server:latest
          env:
            - name: MCP_SERVER
              value: "archive"
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: "production"
          ports:
            - containerPort: 3001
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-archive
  namespace: nara-ai
spec:
  selector:
    app: mcp-archive
  ports:
    - port: 3001
      targetPort: 3001
---
