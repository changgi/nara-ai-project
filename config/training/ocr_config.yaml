# NARA-AI OCR 모델 학습 설정
# Qwen3-VL 8B 기반 한국 기록물 OCR 파인튜닝

model:
  base_model: "Qwen/Qwen3-VL-8B"
  quantization: "qlora-4bit"
  lora:
    rank: 32
    alpha: 64
    dropout: 0.05
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
    use_dora: true

training:
  epochs: 2
  per_device_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  warmup_ratio: 0.1
  max_seq_length: 8192  # 비전 모델은 긴 컨텍스트 필요
  bf16: true
  gradient_checkpointing: true

data:
  path: "data/processed/sft/ocr-korean-archive-100k.jsonl"
  samples: 100000
  format: "vision_instruction"  # 이미지 + 텍스트 쌍
  image_resolution: 1024
  validation_split: 0.05

  # 문서 유형별 분포
  distribution:
    printed_korean: 0.40    # 현대 한글 활자체
    hanja_mixed: 0.25       # 한자 혼용
    handwritten: 0.15       # 필사체
    colonial_era: 0.10      # 일제강점기 문서
    forms_tables: 0.10      # 양식/표

evaluation:
  metrics:
    - "cer"       # Character Error Rate
    - "wer"       # Word Error Rate
    - "accuracy"  # 정확도
  eval_steps: 1000

output:
  output_dir: "checkpoints/nara-ocr-v1"
  logging_dir: "logs/ocr"

tracking:
  wandb:
    project: "nara-ai-ocr"
    tags: ["ocr", "qwen3-vl", "korean-archive"]

gpu:
  min_gpus: 2
  recommended_gpus: 4
  tensor_parallel: 1
